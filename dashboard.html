<!DOCTYPE html>
<html>
<head>
  <title>Panel Admin</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/dashboard.css">
</head>
  <body>

  <header class="admin-header">
    <div class="logo">
      <h1 class="logo-top">HELLIN</h1>
      <div class="logo-line"></div>
      <span class="logo-bottom">AUTOMOTORES</span>
    </div>

    <button onclick="logout()" class="btn-secondary">
  Cerrar sesión
</button>
  </header>

  <section class="admin-section">

    <div class="admin-form-card">
      <h2>Agregar Vehículo</h2>
      <form id="autoForm">
        <div class="admin-form-grid">
          <input type="text" name="marca" placeholder="Marca" required />
          <input type="text" name="modelo" placeholder="Modelo" required />
          <input type="number" name="anio" placeholder="Año" required />
          <input type="number" name="precio" placeholder="Precio" required />
          <input type="number" name="kilometros" placeholder="Kilómetros" />
        </div>

        <textarea name="descripcion" placeholder="Descripción"></textarea>

        <input type="text" name="imagen" placeholder="Ej: ford-focus.png" required>

        <!-- INPUT DE IMAGEN -->
        <input type="file" name="imagen" accept="image/*" />

        <button class="btn-primary">Guardar Vehículo</button>
      </form>
        </div>

    <h2 style="margin-top:60px;">Vehículos Publicados</h2>

    <div id="listaAutos" class="grid">
      <!-- Las cards van acá -->
    </div>

  </section>
    <script src="./js/dashboard.js"></script>
  </body>
</html>
